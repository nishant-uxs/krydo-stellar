name: Feature request
description: Suggest a new capability or improvement.
title: "[feat] "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! Please read [`CONTRIBUTING.md`](../blob/main/CONTRIBUTING.md) first — we prefer to discuss ideas **before** a PR is opened.

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What pain point are you trying to solve? Concrete example > abstract wish.
      placeholder: "As a verifier, I want to verify a ZK proof without first having the credential ID, because I'm integrating from a third-party app that only sees the proof blob."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like this to work? API surface, UI flow, or code sketch is fine.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other designs did you think about, and why did you reject them?

  - type: dropdown
    id: area
    attributes:
      label: Affected area
      multiple: true
      options:
        - Smart contracts
        - ZK proof system
        - Authentication (SIWS / JWT)
        - API / routes
        - Client UI
        - Tests / CI
        - Documentation
        - Other
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission checklist
      options:
        - label: I searched existing issues and didn't find a duplicate.
          required: true
        - label: I've read CONTRIBUTING.md.
          required: true
        - label: This is not a security vulnerability (those go through SECURITY.md).
          required: true
